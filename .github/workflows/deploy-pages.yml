name: Deploy dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/fetch-journals.yml"
  workflow_run:
    workflows:
      - "Fetch DOAJ journals (monthly)"
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encrypt data and generate config
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          LATAM_APPLICATIONS_DATA: ${{ secrets.LATAM_APPLICATIONS_DATA }}
          AFRICA_APPLICATIONS_DATA: ${{ secrets.AFRICA_APPLICATIONS_DATA }}
        run: |
          node scripts/encrypt_data.js
          mkdir -p docs
          if [ -n "$DASHBOARD_PASSWORD" ]; then
            echo "window.ENCRYPTION_ENABLED = true;" > docs/config.js
          else
            echo "window.ENCRYPTION_ENABLED = false;" > docs/config.js
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
